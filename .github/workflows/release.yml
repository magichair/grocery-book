name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write      # create GitHub Releases
  packages: write      # push to GHCR

jobs:
  release:
    name: Build, push image & create release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Parse version from tag ──────────────────────────────────────────────
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ── Docker setup ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build & push ─────────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          # Cache layers in the registry — dramatically speeds up re-builds
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to:   type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.title=Grocery Book
            org.opencontainers.image.description=Track and compare unit prices across stores
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MIT

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            Or in `docker-compose.prod.yml`:

            ```yaml
            image: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            See the [README](https://github.com/${{ github.repository }}#self-hosting-with-docker) for full setup instructions.
