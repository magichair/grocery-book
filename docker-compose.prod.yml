# Production docker-compose — app + PostgreSQL.
#
# ── First deploy / after schema changes ────────────────────────────────────────
# Run migrations before (or after) starting the app:
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm migrate
#
# ── Normal startup ──────────────────────────────────────────────────────────────
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# ── Update to a new image ───────────────────────────────────────────────────────
#   docker compose -f docker-compose.prod.yml --env-file .env.prod pull
#   docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm migrate
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-grocery_book}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-grocery_book}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot migration runner — uses the builder stage which has pnpm + Prisma CLI.
  # Run with: docker compose ... run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    # Always build locally — never attempt to pull from a registry.
    # Without this, `docker compose pull` invents an image name and fails.
    pull_policy: build
    command: pnpm --filter @grocery-book/db exec prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-grocery_book}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-grocery_book}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY:?AUTH_RESEND_KEY is required}
      RESEND_FROM: ${RESEND_FROM:?RESEND_FROM is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
