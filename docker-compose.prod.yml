# Production docker-compose — app + PostgreSQL.
#
# ── GitOps / Portainer ─────────────────────────────────────────────────────────
# Point Portainer at this repo + file.  On every detected change it runs:
#   docker compose up -d --build
#
# Startup order is enforced automatically:
#   postgres (healthy) → migrate (exits 0) → app
#
# ── Manual deploy ──────────────────────────────────────────────────────────────
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-grocery_book}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-grocery_book}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot migration runner — uses the builder stage which has pnpm + Prisma CLI.
  # Run with: docker compose ... run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    pull_policy: build
    command: pnpm --filter @grocery-book/db run db:migrate:deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-grocery_book}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Always build locally — never attempt to pull from a registry.
    # Without this, `docker compose pull` invents an image name and fails.
    pull_policy: build
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-grocery_book}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY:?AUTH_RESEND_KEY is required}
      RESEND_FROM: ${RESEND_FROM:?RESEND_FROM is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
